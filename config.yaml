# Browser to load YouTube cookies from if a download fails with an auth error
# (403, sign-in required, etc.). Set to null to skip cookie use entirely.
# The browser must be installed AND have been used to browse YouTube so that
# valid cookies exist in its profile. Downloads are always attempted without
# cookies first; cookies are only used as a fallback when the plain attempt fails.
# Supported values: chrome, chromium, firefox, edge, brave, safari, opera
cookies_browser: chrome
youtube_player_client: android
download_delay_min: 3
download_delay_max: 8
frame_extraction_method: scene_change
uniform_sampling_interval: 30
min_frames_per_video: 10
dedup_threshold: 90
# DEV MODE: lowered to match 360p test downloads. Raise back to 1920/1080 before production.
min_resolution_width: 640
min_resolution_height: 360
review_batch_size: 30
nearby_frames_window: 60
available_themes:
  - economic
  - social
  - cultural
playwright_timeout_seconds: 60
playwright_delay_between_captures: 2
playwright_headless: true
